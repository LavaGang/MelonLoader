name: Build MelonLoader

run-name: 0.7.2${{ github.event_name != 'workflow_dispatch' && format('-ci.{0}', github.run_number) || '' }} | ${{ github.event_name != 'workflow_dispatch' && (github.event.head_commit.message || format('`[PR]` {0}', github.event.pull_request.title)) || 'Manual Build' }}

on:
  push:
    branches: [ master, alpha-development ]
  pull_request:
    branches: [ master, alpha-development ]
  workflow_dispatch:

jobs:
  build:
    name: Build
    uses: ./.github/workflows/compile_all.yml
    with:
      SKIP_DEBUG: false
      VERSION: "0.7.2${{ github.event_name != 'workflow_dispatch' && format('.{0}', github.run_number) || '' }}"
      PACKAGE_VERSION: "0.7.2${{ github.event_name != 'workflow_dispatch' && format('{0}', github.run_number) || '' }}"
      PACKAGE_NAME: MelonLoader.Nightly
      
  upload_thunderstore:
    name: Upload to Thunderstore
    needs: [ build ]
    uses: ./.github/workflows/upload_thunderstore.yml
    with:
      VERSION: "0.7.2${{ github.event_name != 'workflow_dispatch' && format('{0}', github.run_number) || '' }}"
      PACKAGE_NAME: MelonLoader.Nightly
    secrets: inherit