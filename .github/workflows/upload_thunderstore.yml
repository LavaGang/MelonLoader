env:
  PACKAGE_DESC: The World's First Universal Mod Loader for Unity Games compatible with both Il2Cpp and Mono
  PACKAGE_REPO: https://github.com/${{ github.repository }}

on:
  workflow_call:
    inputs:
      VERSION:
        required: true
        type: string
      PACKAGE_NAME:
        required: true
        type: string
  
jobs:
  upload_thunderstore:
    name: Upload Thunderstore
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
          
      - name: Download Artifact
        uses: actions/download-artifact@v8
        with:
          name: MelonLoader.Thunderstore
          path: ./compiled_thunderstore/
      - name: Package Artifact into Zip Archive
        run: |
          cd compiled_thunderstore
          zip -r ../${{ github.repository_owner }}-${{ inputs.PACKAGE_NAME }}-${{ inputs.VERSION }}.zip ./
      
      - name: Publish Package
        id: pub
        uses: GreenTF/upload-thunderstore-package@aef20d7e07a0858d0decae64872aa5526662ab8d
        with:
          community: ${{ vars.TS_COM }}
          namespace: ${{ github.repository_owner }}
          name: ${{ inputs.PACKAGE_NAME }}
          version: ${{ inputs.VERSION }}
          description: ${{ env.PACKAGE_DESC }}
          token: ${{ secrets.TS_KEY }}
          file: ${{ github.repository_owner }}-${{ inputs.PACKAGE_NAME }}-${{ inputs.VERSION }}.zip
          
      - name: Get URL
      - run: echo ${{ steps.pub.outputs.url }}
      